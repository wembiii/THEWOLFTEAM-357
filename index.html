<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE WOLF TEAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #b30000;
            --white: #ffffff;
            --black: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at center, #222, var(--black));
            color: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 1s ease-out;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            animation: glow 2s infinite alternate;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 85%;
            max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            animation: fadeInUp 1s ease-out;
        }

        h2 { margin-bottom: 30px; font-weight: 400; letter-spacing: 1px; }

        .link-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 15px 25px;
            color: var(--white);
            text-decoration: none;
            border: 1px solid var(--red);
            border-radius: 50px;
            transition: all 0.4s ease;
            background: transparent;
            font-size: 1rem;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            background: var(--red);
            box-shadow: 0 0 20px var(--red);
            transform: translateY(-3px);
            letter-spacing: 1px;
        }

        .native {
            opacity: 0.7;
            font-size: 0.9rem;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px #ff0000, 0 0 10px #ff0000; }
            to { text-shadow: 0 0 20px #ff0000, 0 0 30px #ff0000; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>THE WOLF TEAM</h1>
    </header>

    <div class="container">
        <h2>Welcome to the pack!</h2>

        <div class="link-container">
            <a href="https://wembiii.github.io/THEWOLFTEAM-EN/" class="btn">English <span class="native"></span></a>
            <a href="https://wembiii.github.io/THEWOLFTEAM-PL/" class="btn">Polish <span class="native">Polski</span></a>
            <a href="https://wembiii.github.io/THEWOLFTEAM-BG/" class="btn">Bulgarian <span class="native">Български</span></a>
            <a href="https://wembiii.github.io/THEWOLFTEAM-AR/" class="btn">Arabic <span class="native">العربية</span></a>
            <a href="https://wembiii.github.io/THEWOLFTEAM-TR/" class="btn">Turkish <span class="native">Türkçe</span></a>
        </div>
    </div>

</body>
</html>
