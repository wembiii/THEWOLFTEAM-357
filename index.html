<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE WOLF TEAM</title>
    <style>
        /* General Reset & Body */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; /* Dark Gray/Black */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Ribbon / Header */
        header {
            width: 100%;
            background-color: #b30000; /* Deep Red */
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 50px;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: #ffffff;
            /* Glowing Effect */
            text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff0000;
        }

        /* Body Content */
        main {
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 40px;
            color: #e0e0e0;
        }

        /* Links/Buttons */
        .link-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            padding: 15px;
            background-color: #1a1a1a;
            color: white;
            text-decoration: none;
            border: 2px solid #b30000; /* Red Border */
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #b30000; /* Red Fill on Hover */
            color: white;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <header>
        <h1>THE WOLF TEAM</h1>
    </header>

    <main>
        <h2>Welcome to the pack!</h2>

        <div class="link-container">
            <a href="https://wembiii.github.io/THEWOLFTEAM-EN/" class="btn">English</a>
            <a href="https://wembiii.github.io/THEWOLFTEAM-PL/" class="btn">Polish</a>
            <a href="https://wembiii.github.io/THEWOLFTEAM-BG/" class="btn">Bulgarian</a>
            <a href="https://wembiii.github.io/THEWOLFTEAM-AR/" class="btn">Arabic</a>
            <a href="https://wembiii.github.io/THEWOLFTEAM-TR/" class="btn">Turkish</a>
        </div>
    </main>

</body>
</html>
